<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Комбинаторика</title>
</head>
<body>
<h1>Комбинаторика</h1>

<ul>
    {% for p in problems %}
        <li>
            <a href="{{ url_for('problem_detail', problem_id=p.id) }}">
                {{ p.title }}
            </a>
        </li>
    {% endfor %}
</ul>

<p><a href="{{ url_for('index') }}">На главную</a></p>
</body>
</html>
